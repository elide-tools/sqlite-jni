name: Build SQLite3 + JNI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write       # Sigstore OIDC keyless signing
  attestations: write   # GitHub build attestations

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact: libsqlite3elide-linux-amd64
            make_args: ""
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            artifact: libsqlite3elide-linux-arm64
            make_args: "CROSS_HOST=aarch64-linux-gnu"
            cross: true
          - os: ubuntu-latest
            target: x86_64-linux-musl
            artifact: libsqlite3elide-linux-amd64-musl
            make_args: "MUSL=yes"
            musl: true
          - os: macos-latest
            target: arm64-apple-darwin
            artifact: libsqlite3elide-macos-arm64
            make_args: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: libsqlite3elide-macos-amd64
            make_args: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sqlite3elide-windows-amd64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - name: "Setup: Harden Runner"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: false
          egress-policy: audit
      - name: "Setup: Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          submodules: true
          clean: false
          persist-credentials: false
      - name: "Setup: JDK"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: oracle
          java-version: '25'
      - name: "Setup: Cosign"
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: "Setup: Cross-compiler (ARM64)"
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: "Setup: musl-tools"
        if: matrix.musl
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: "Build: SQLite (Unix)"
        if: runner.os != 'Windows'
        run: make install ${{ matrix.make_args }} VERBOSE=yes
      - name: "Build: SQLite (Windows)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Locate Visual Studio and enter developer shell
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -property installationPath
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -Arch amd64

          cd sqlite

          # Generate the amalgamation
          nmake /f Makefile.msc clean
          nmake /f Makefile.msc sqlite3.c

          # Append JNI source to the amalgamation
          Get-Content sqlite3.c, ..\jni\sqlite3jni.c | Set-Content sqlite3elide.c
          Remove-Item sqlite3.c
          Rename-Item sqlite3elide.c sqlite3.c

          # Copy JNI and JDK headers
          Copy-Item ..\jni\sqlite3jni.h .
          Copy-Item "$env:JAVA_HOME\include\jni.h" .
          Copy-Item "$env:JAVA_HOME\include\win32\jni_md.h" .

          # Build the static library
          nmake /f Makefile.msc `
              libsqlite3.lib `
              USE_CRT_DLL=0 `
              USE_NATIVE_LIBPATHS=1 `
              "OPTS=-DSQLITE_CORE=1 -DSQLITE_DEFAULT_MEMSTATUS=0 -DSQLITE_DISABLE_PAGECACHE_OVERFLOW_STATS=1 -DSQLITE_ENABLE_API_ARMOR=1 -DSQLITE_ENABLE_COLUMN_METADATA=1 -DSQLITE_ENABLE_DBSTAT_VTAB=1 -DSQLITE_ENABLE_FTS3=1 -DSQLITE_ENABLE_FTS3_PARENTHESIS=1 -DSQLITE_ENABLE_FTS5=1 -DSQLITE_ENABLE_LOAD_EXTENSION=1 -DSQLITE_ENABLE_MATH_FUNCTIONS=0 -DSQLITE_ENABLE_RTREE=1 -DSQLITE_ENABLE_STAT4=1 -DSQLITE_HAVE_ISNAN=1 -DSQLITE_MAX_ATTACHED=25 -DSQLITE_MAX_COLUMN=32767 -DSQLITE_MAX_FUNCTION_ARG=127 -DSQLITE_MAX_LENGTH=2147483647 -DSQLITE_MAX_MMAP_SIZE=1099511627776 -DSQLITE_MAX_PAGE_COUNT=4294967294 -DSQLITE_MAX_SQL_LENGTH=1073741824 -DSQLITE_MAX_VARIABLE_NUMBER=250000 -DSQLITE_THREADSAFE=1 -DSQLITE_GVM_STATIC=1"

          Rename-Item libsqlite3.lib sqlite3elide.lib

          # Create output layout
          cd ..
          New-Item -ItemType Directory -Path out\lib -Force | Out-Null
          New-Item -ItemType Directory -Path out\include -Force | Out-Null
          Copy-Item sqlite\sqlite3elide.lib out\lib\
          Copy-Item sqlite\sqlite3.h out\include\
          Copy-Item sqlite\sqlite3ext.h out\include\
          Copy-Item jni\sqlite3jni.h out\include\
      - name: "Package"
        shell: bash
        run: tar -czf ${{ matrix.artifact }}.tgz -C out .

      # ---- Supply-chain security ----

      - name: "Sign: Sigstore"
        shell: bash
        run: cosign sign-blob --yes --bundle ${{ matrix.artifact }}.tgz.bundle ${{ matrix.artifact }}.tgz
      - name: "SBOM: Generate"
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: out/
          format: cyclonedx-json
          output-file: ${{ matrix.artifact }}.sbom.json
          upload-artifact: false
      - name: "Attest: Build Provenance (SLSA)"
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ matrix.artifact }}.tgz
      - name: "Attest: SBOM"
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ matrix.artifact }}.tgz
          sbom-path: ${{ matrix.artifact }}.sbom.json

      # ---- Upload ----

      - name: "Artifacts"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tgz
            ${{ matrix.artifact }}.tgz.bundle
            ${{ matrix.artifact }}.sbom.json

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: "Setup: Harden Runner"
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: audit
      - name: "Setup: Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: "Setup: Release Metadata"
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract SQLite version and date from tag: v<version>-<YYYYMMDD>[.rev]
          SQLITE_VERSION=$(echo "$TAG" | sed 's/^v//; s/-[0-9]\{8\}.*//')
          RELEASE_DATE=$(echo "$TAG" | grep -oE '[0-9]{8}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sqlite_version=$SQLITE_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_date=$RELEASE_DATE" >> "$GITHUB_OUTPUT"
      - name: "Release"
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: "SQLite ${{ steps.meta.outputs.sqlite_version }} (${{ steps.meta.outputs.release_date }})"
          files: |
            artifacts/**/*.tgz
            artifacts/**/*.tgz.bundle
            artifacts/**/*.sbom.json
          generate_release_notes: true
